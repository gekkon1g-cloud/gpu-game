[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:llama-server]
command=/app/llama-server
    --model /models/Qwen3-VL-8B-Heretic-Stable.Q4_K_M.gguf
    --mmproj /models/Qwen3-VL-8B-Heretic-Stable.mmproj-bf16.gguf
    --host 0.0.0.0
    --port 10000
    --ctx-size 32768
    --n-gpu-layers 99
    --flash-attn on
    --parallel 1
    --jinja
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=20
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/llama-server.log
stderr_logfile=/var/log/supervisor/llama-server-error.log
environment=CUDA_VISIBLE_DEVICES="0",LD_LIBRARY_PATH="/app"
priority=10

[program:open-webui]
command=/opt/open-webui/venv/bin/open-webui serve --host 0.0.0.0 --port 3000
directory=/data/open-webui
autostart=true
autorestart=true
startsecs=10
startretries=20
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/open-webui.log
stderr_logfile=/var/log/supervisor/open-webui-error.log
environment=DATA_DIR="/data/open-webui",ENABLE_OLLAMA_API="false",OPENAI_API_BASE_URL="http://127.0.0.1:10000/v1",OPENAI_API_KEY="gpu-game-local",WEBUI_AUTH="true",UVICORN_WORKERS="1"
priority=20
